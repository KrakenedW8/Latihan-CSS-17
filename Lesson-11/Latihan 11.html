<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 11</title>
</head>
<body>
  <style>


body {
  font-family: Arial;
  margin: 20px;
}

h2 {
  margin-top: 40px;
}

.box-blue {
  background-color: lightblue;
  padding: 10px;
}

.box-pink {
  background-color: lightpink;
  padding: 10px;
}

.grid-11a {
  display: grid;
  grid-template-columns: 200px 75px;
}

.grid-11b {
  display: grid;
  grid-template-columns: 50px 1fr 75px;
  margin-top: 10px;
}

.grid-11c {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  column-gap: 20px;
  row-gap: 10px;
  margin-top: 10px;
}

.item {
  background-color: lightpink;
  padding: 10px;
}


.grid-11d {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 10px;
  max-width: 550px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
}

.card-img {
  width: 200px;
  height: 200px;
  object-fit: cover;
}

.name {
  font-weight: bold;
  margin: 5px 0;
}

.mutual-row {
  display: grid;
  grid-template-columns: 30px 1fr;
  align-items: center;
  margin-bottom: 5px;
}

.mutual-img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
}

.mutual-text {
  font-size: 14px;
  color: gray;
  margin-left: 5px;
}

.btn {
  background-color: blue;
  color: white;
  border: none;
  padding: 8px;
  cursor: pointer;
}


  </style>
</head>
<body>

  <h2>11a</h2>
  <div class="grid-11a">
    <div class="box-blue">200px</div>
    <div class="box-pink">75px</div>
  </div>

  <h2>11b</h2>
  <div class="grid-11b">
    <div class="box-blue">col1</div>
    <div class="box-pink">col2</div>
    <div class="box-blue">col3</div>
  </div>

  <h2>11c</h2>
  <div class="grid-11c">
    <div class="item">col1</div>
    <div class="item">col2</div>
    <div class="item">col3</div>
    <div class="item">col4</div>

<div class="item">col1</div>
<div class="item">col2</div>
<div class="item">col3</div>
<div class="item">col4</div>

  </div>

  <h2>11d</h2>
  <div class="grid-11d">

<div class="card">
  <img class="card-img" src="toph.jpg" alt="Toph">
  <div class="name">Toph Beifong</div>
 <div class="mutual-row">
  <img class="mutual-img" src="toph2.jpg"">
  <div class="mutual-text">10B mutual friends</div>
</div>
  <button class="btn">Add Friend</button>
</div>

<div class="card">
  <img class="card-img" src="Toph3.jpg" alt="Toph">
  <div class="name">Toph Beifong 2x</div>
 <div class="mutual-row">
  <img class="mutual-img" src="Toph4.jpg">
  <div class="mutual-text">10T mutual friends</div>
</div>
  <button class="btn">Add Friend</button>
</div>

<div class="card">
  <img class="card-img" src="Toph5.jpg" alt="Toph">
  <div class="name">Toph Beifong 3x</div>
  <div class="mutual-row">
  <img class="mutual-img" src="Toph6.jpg">
  <div class="mutual-text">10QD mutual friends</div>
</div>
  <button class="btn">Add Friend</button>
</div>

  </div>

</body>
</html>

</body>
</html>
